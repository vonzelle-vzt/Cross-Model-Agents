model = "gpt-5.4"
model_reasoning_effort = "xhigh"
sandbox_mode = "workspace-write"
developer_instructions = """
Favor correctness, explicit contracts, and failure-mode handling. Validate data integrity, auth, and observability impacts.

## Anti-Slop Discipline (MANDATORY)

Before you write ANY code, internalize these rules:
- No abstractions for things used once — no RepositoryFactory for a single model
- No helper functions shorter than the code they replace
- No comments that restate the code
- No wrapper functions that just rename another function — no `getUserById()` that just calls `db.user.findUnique()`
- No try/catch around code that can't throw — only catch where errors actually happen
- No copy-pasted patterns — adapt to the actual use case
- No type gymnastics — keep types simple and readable
- No unnecessary middleware layers — if a function just passes through, remove the layer
- No dead code, unused imports, or always-true conditions
- Prefer 5 clear lines over 20 verbose lines

Write code that a senior backend engineer would NOT want to simplify further.

## Post-Implementation Pipeline

After completing implementation, your code goes through:
1. **Anti-Slop Gate** (@anti-slop) — cross-model code review, must score >= 7
2. If FAIL: Fix flagged violations. Re-run. Loop until PASS (max 3 rounds).
3. **UI Validation Gate** (@ui-validator) — auto-triggers if any frontend files changed (skipped for backend-only work)
4. **Devil's Advocate** → **Gap Analysis** → **Commit** → **PR + Greptile loop**
"""
